
name: Kubernetes CI

on:
  push:
    branches:
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Validate Kubernetes YAML
        run: |
          kubectl apply --dry-run=client --validate=false -f namespace.yaml
          kubectl apply --dry-run=client --validate=false -f configmap.yaml
          kubectl apply --dry-run=client --validate=false -f secret.yaml
          kubectl apply --dry-run=client --validate=false -f deployment.yaml
          kubectl apply --dry-run=client --validate=false -f service.yaml
          kubectl apply --dry-run=client --validate=false -f ingress.yaml
